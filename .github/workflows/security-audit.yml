name: Security Audit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sast-and-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Install dependencies and scanners
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install bandit pip-audit semgrep

      - name: Run Bandit
        run: bandit -r . -ll -x ./.venv,./tests,./.tmp,./macos_app/.build

      - name: Run Semgrep
        run: semgrep --config auto .

      - name: Run pip-audit
        run: |
          pip-audit \
            -r requirements.txt \
            --ignore-vuln GHSA-f4j7-r4q5-qw2c \
            --ignore-vuln PYSEC-2026-311 \
            --ignore-vuln CVE-2026-45829
