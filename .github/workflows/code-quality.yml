name: Code Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run focused pytest suites
        env:
          PYTHONPATH: .
        run: |
          pytest \
            tests/test_backend_service.py \
            tests/test_config.py \
            tests/test_pdf_audiobook.py \
            tests/test_pdf_audiobook_service_contract.py \
            tests/test_streaming_tts.py \
            tests/test_audio_handler.py \
            tests/test_dependency_health.py \
            tests/test_memory_manager.py \
            tests/test_runtime_controller.py \
            tests/test_continuous_listening.py \
            tests/test_runtime_resilience.py \
            tests/test_app_paths.py

      - name: Validate shell scripts
        run: bash -n scripts/install_lulu.sh scripts/start_lulu.sh

  swift-source-validation:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Type-check Swift sources
        run: |
          cd macos_app
          swiftc -typecheck Sources/LuluApp/App/*.swift \
            Sources/LuluApp/Features/Assistant/*.swift \
            Sources/LuluApp/Features/Diagnostics/*.swift \
            Sources/LuluApp/Features/PDFAudiobooks/*.swift \
            Sources/LuluApp/Features/Settings/*.swift \
            Sources/LuluApp/Models/*.swift \
            Sources/LuluApp/Services/*.swift
