name: Code Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Collect changed Python files
        id: changed-python
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            files=$(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" -- '*.py')
          else
            files=$(git diff --name-only --diff-filter=ACMR "${{ github.event.before }}...${{ github.sha }}" -- '*.py')
          fi

          if [ -z "$files" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$files" > changed-python-files.txt
          echo "has_files=true" >> "$GITHUB_OUTPUT"

      - name: Run Ruff
        if: steps.changed-python.outputs.has_files == 'true'
        run: xargs -0 ruff check < <(tr '\n' '\0' < changed-python-files.txt)

      - name: Run focused pytest suites
        env:
          PYTHONPATH: .
        run: |
          pytest \
            tests/test_backend_service.py \
            tests/test_config.py \
            tests/test_pdf_audiobook.py \
            tests/test_pdf_audiobook_service_contract.py \
            tests/test_streaming_tts.py \
            tests/test_audio_handler.py \
            tests/test_dependency_health.py \
            tests/test_memory_manager.py
